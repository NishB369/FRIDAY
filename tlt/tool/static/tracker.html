<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tracker</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px 40px; background: #fff; color: #000;
    font-family: Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #666; margin-bottom: 24px; }
  .sub a { color: #000; }
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
  .toolbar button { border: 1px solid #000; background: #fff; padding: 6px 14px;
    font-family: inherit; font-size: 13px; cursor: pointer; }
  .toolbar button:hover { background: #000; color: #fff; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border-bottom: 1px solid #e0e0e0; padding: 10px 8px; text-align: left;
    vertical-align: top; font-size: 13px; }
  th { border-bottom: 2px solid #000; font-weight: 700; text-transform: uppercase;
    font-size: 11px; letter-spacing: 1px; }
  tr:hover { background: #f7f7f7; }
  .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; }
  .ok { color: #1a7a2f; font-weight: 700; }
  .warn { color: #b50; font-weight: 700; }
  .miss { color: #aaa; }
  .preview { color: #555; max-width: 360px; font-size: 12px; }
  .pill { display: inline-block; padding: 2px 8px; border: 1px solid #000; font-size: 11px;
    letter-spacing: 0.5px; text-transform: uppercase; }
  .empty { padding: 40px; text-align: center; color: #888; border: 1px dashed #ccc; }
  footer { margin-top: 24px; font-size: 12px; color: #999; }
  .preview { cursor: pointer; }
  .preview:hover { text-decoration: underline; }
  .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-start; justify-content: center; padding: 60px 20px; z-index: 100; }
  .modal-back.show { display: flex; }
  .modal { background: #fff; border: 1px solid #000; max-width: 820px; width: 100%;
    max-height: 85vh; overflow-y: auto; padding: 24px 28px; }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal .meta { font-size: 12px; color: #666; margin-bottom: 16px; font-family: "SF Mono",Menlo,monospace; }
  .modal h3 { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin: 18px 0 6px; border-bottom: 1px solid #000; padding-bottom: 4px; }
  .modal pre { white-space: pre-wrap; word-break: break-word; background: #f7f7f7;
    border: 1px solid #e0e0e0; padding: 12px 14px; font-size: 13px; margin: 0; }
  .modal .close { float: right; border: 1px solid #000; background: #fff;
    padding: 4px 12px; cursor: pointer; font: inherit; font-size: 12px; }
  .modal .close:hover { background: #000; color: #fff; }
</style>
</head>
<body>

<h1>Pipeline Tracker</h1>
<div class="sub">TLT audio → Groq → Hinglish jobs. <a href="/">← back to console</a></div>

<div class="toolbar">
  <button id="refresh">Refresh</button>
  <span id="count" class="mono"></span>
</div>

<div id="tableWrap"></div>

<div class="modal-back" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close" onclick="closeModal()">Close ✕</button>
    <h2 id="mTitle"></h2>
    <div class="meta" id="mMeta"></div>
    <h3>Prompt sent to Groq</h3>
    <pre id="mPrompt"></pre>
    <h3>Full transcript</h3>
    <pre id="mText"></pre>
  </div>
</div>

<footer id="ts"></footer>

<script>
let ROWS = [];
function openModal(jobId) {
  const r = ROWS.find(x => x.job_id === jobId);
  if (!r) return;
  document.getElementById('mTitle').textContent = (r.title || r.slug || r.job_id);
  document.getElementById('mMeta').textContent =
    `${r.job_id} · ${r.author || '—'} · ${r.form || '—'} · ${r.duration ?? '—'}s · ${r.word_count ?? '—'} words · Devanagari ${r.devanagari_ratio != null ? (r.devanagari_ratio*100).toFixed(1)+'%' : '—'}`;
  document.getElementById('mPrompt').textContent = r.prompt_used || '(none)';
  document.getElementById('mText').textContent = r.text_full || '(empty)';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function load() {
  const r = await fetch('/api/jobs', { cache: 'no-store' });
  ROWS = await r.json();
  const rows = ROWS;
  document.getElementById('count').textContent = rows.length + ' job' + (rows.length===1?'':'s');
  const wrap = document.getElementById('tableWrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">No jobs yet. Run one from the <a href="/">console</a>.</div>';
    return;
  }
  let html = `<table><thead><tr>
    <th>Time</th><th>Job</th><th>Slug</th><th>Title</th><th>Author</th><th>Form</th>
    <th>Dur</th><th>Words</th><th>Dev%</th><th>Valid</th><th>Retry</th><th>Preview</th>
  </tr></thead><tbody>`;
  for (const r of rows) {
    const d = new Date(r.ts * 1000);
    const ts = d.toLocaleString('en-GB', { hour12: false });
    const dev = r.devanagari_ratio != null ? (r.devanagari_ratio*100).toFixed(1)+'%' : '—';
    const valid = r.validation_ok == null ? '—'
      : (r.validation_ok ? '<span class="ok">OK</span>' : '<span class="warn">WARN</span>');
    const retry = r.retry === true ? '<span class="warn">yes</span>'
                  : r.retry === false ? 'no' : '—';
    html += `<tr>
      <td class="mono">${ts}</td>
      <td class="mono">${r.job_id}</td>
      <td>${r.slug || '<span class="miss">—</span>'}</td>
      <td>${r.title || '<span class="miss">—</span>'}</td>
      <td>${r.author || '<span class="miss">—</span>'}</td>
      <td>${r.form ? '<span class="pill">'+r.form+'</span>' : '<span class="miss">—</span>'}</td>
      <td class="mono">${r.duration != null ? r.duration+'s' : '—'}</td>
      <td class="mono">${r.word_count ?? '—'}</td>
      <td class="mono">${dev}</td>
      <td>${valid}</td>
      <td class="mono">${retry}</td>
      <td class="preview" onclick="openModal('${r.job_id}')" title="Click to expand">${(r.text_preview || '').replace(/</g,'&lt;')}${r.text_preview && r.text_preview.length>=200 ? '…' : ''}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
  document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB');
}
document.getElementById('refresh').addEventListener('click', load);
load();
setInterval(load, 10000);
</script>

</body>
</html>
