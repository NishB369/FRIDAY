ord the other says — yet both walk away convinced the exchange went perfectly. This darkly funny short story is essential reading in the BA English Honours syllabus, exploring themes of poverty and colonial encounter with the quiet devastation Narayan made his signature.\n\n______________________________________________________________________\nWant notes, summaries & quizzes for this video? Everything's free at theliteraturetalks.com", "old_tags": ["a horse and two goats summary", "a horse and two goats by rk narayan", "a horse and two goats conclusion", "a horse and two goats", "rk narayan", "short story", "rk narayan story", "english", "english literature", "literature", "indian english literature", "a horse and two goats in hindi", "a horse and two goats summary in hindi"], "new_tags": ["a horse and two goats summary", "a horse and two goats by rk narayan", "a horse and two goats conclusion", "a horse and two goats", "rk narayan", "short story", "rk narayan story", "english literature", "literature", "indian english literature", "a horse and two goats in hindi", "a horse and two goats summary in hindi", "the literature talks"], "audit": {}, "changes": {"title": true, "tags": true, "description": true}}, {"video_id": "ZzG9jbVkuus", "old_title": "A POEM FOR MY MOTHER | ROBIN NGANGOM | LINE BY LINE | FULL HINDI EXPLANATION | ANALYSIS", "new_title": "A Poem For My Mother By Robin Ngangom | Line By Line Explanation in Hindi", "old_desc": "Palem Apokpi, mother who gave birth to me,\nto be a man how I hated leaving home\nten years ago. Now these hills\nhave grown on me.\nBut I’m still your painfully shy son\nwith a ravenous appetite,\nthe boy who lost many teeth after\nemptying your larder. And\nI am also your dreamy-eyed lad\nwho gave you difficult times\nduring his schooldays, romancing\nevery girl he wanted, even\nwhen he still wore half-pants.\n \n \nYou told your children that\nmoney and time do not grow on trees, and\nI could never learn to keep up with them.\nIt n, My Captain!” is a poem to a recently deceased ship captain. The speaker of the poem is one of the sailors who celebrates the safe and successful return of the ship and mourns the loss of his great leader. The poem can be classified as an “elegy,” an expression of sorrow or lamentation for the dead. \n\n\nWhitman wrote this poem shortly after President Abraham Lincoln was assassinated. The “Captain” represents Lincoln and the poem itself is an extended metaphor memorializing his Presidency and the Civil War. \n\n\ncomparing relief and despair, the poem addresses both the Union victory and the uncertainty which would follow. The first lines express a celebratory spirit: “O Captain! my Captain! our fearful trip is done, the ship has weather’d every rack, the prize we sought is won.” The speaker then notes the cheering crowds. The ship represents the war-weathered nation following the Civil War and the “prize won” is the salvaged Union.  \n\n\nIn the second stanza, the speaker reveals that his Captain's dead body is lying on the deck. In the first line of this stanza, the speaker implores the Captain to \"rise up and hear the bells,\" wishing the dead man could witness the people’s elation. Everyone adored the captain, and the speaker admits that his death feels like a horrible dream. \n\n\nWhitman's poetry places a lot of emphasis on the individual. The speaker\nstruggles to balance his personal feelings of loss with the celebratory mood following the successful voyage: The last lines read, “Exult O shores, and ring O bells! / But I with mournful tread / Walk the deck my Captain lies, / Fallen cold and dead.” \n\n\nWhile the War claimed many lives, it led to the reunification of the Union, so many Americans felt similarly divided. Here, the speaker’s inner thoughts set him apart from the crowd. \n\n\nWhitman has been called “the father of free verse,” a style that refuses regular meter and rhyme scheme. \"O Captain! My Captain!\" is different, however. It is composed of three eight-line stanzas, each following an AABBCDED rhyme pattern. \n\n\nThe traditional form reflects the solemnity of the poem’s content: each stanza closes with the words \"fallen cold and dead.\"  The regular meter is reminiscent of a soldier marching across the battlefield—fitting for a poem commemorating the end of the Civil War.\n\n\n\n______________________________________________________________________\nFOLLOW ME ON INSTAGRAM - \nhttps://www.instagram.com/aaanchalbhatiaaa/\n______________________________________________________________________\nCHECK OUT THE LINK BELOW TO READ SOME AMAZING REVIEWS AND GET SOME DISCOUNTS ON YOUR FAVOURITE NOVELS\nhttp://www.ratingshating.com/\n______________________________________________________________________\n\nMy channel publishes videos that focus on literature lessons and poems from class 6th to Ba Eng Hons. If that sounds like it could be helpful for you, please join me!", "new_desc": "Walt Whitman’s “O Captain, My Captain!” is a poem to a recently deceased ship captain. The speaker of the poem is one of the sailors who celebrates the safe and successful return of the ship and mourns the loss of his great leader. The poem can be classified as an “elegy,” an expression of sorrow or lamentation for the dead.\n\nWhitman wrote this poem shortly after President Abraham Lincoln was assassinated. The “Captain” represents Lincoln and the poem itself is an extended metaphor memorializing his Presidency and the Civil War.\n\ncomparing relief and despair, the poem addresses both the Union victory and the uncertainty which would follow. The first lines express a celebratory spirit: “O Captain! my Captain! our fearful trip is done, the ship has weather’d every rack, the prize we sought is won.” The speaker then notes the cheering crowds. The ship represents the war-weathered nation following the Civil War and the “prize won” is the salvaged Union.\n\nIn the second stanza, the speaker reveals that his Captain's dead body i ety and she remains only a caretaker for household utensils, children, husband, other domestic requirements and tasks of fatigue. What is manly and what is feminine? Why should it be so? Why can’t women go out in the world? Why should men be masterly and women subservient? Why can’t men and women be open about their sexuality? Dattani raises these and a host of other questions regarding gender and social stratification and hierarchy and sexuality.\n\nIn the play, Dattani seems to assert the power of wealth often joins hands with the power of patriarchy for the subjugation and oppression of the women in our society. Tara’s grandfather uses his political and money power to convince the doctor for giving the third leg to Chandan instead of Tara. To look at son and daughter with biased and discriminating eyes has been the traditional and age-old custom in India and it has been tagged with rites and rituals of life.\n\nThe whole drama is circling around one dark secret and its revelation.", "new_desc": "Mahesh Dattani is one of the best contemporary playwrights in India who occupies a very distinct and unique place in the realm of Indian English Drama. He is a Bangalore-based playwright and director. His plays are performed and read almost everywhere in India and abroad. His representation of problems from real-life situations is a significant contribution to Indian English Drama.\n\nTara is the most touching three-act stage play by Dattani. It presents a tale of Siamese twins namely Tara and Chandan. The theme of gender discrimination is dominant in the drama. It circles around the grave and traditional issues of gender bias. The issue of cultural discrimination and injustice against women has been elaborately and comprehensively dealt with by Dattani in the play. Wherein a female is subjugated and underestimated by patriarchal society and she remains only a caretaker for household utensils, children, husband, other domestic requirements and tasks of fatigue. What is manly and what is feminine? Why should it be so? Why can’t women go out in the world? Why should men be masterly and women subservient? Why can’t men and women be open about their sexuality? Dattani raises these and a host of other questions regarding gender and social stratification and hierarchy and sexuality.\n\nIn the play, Dattani seems to assert the power of wealth often joins hands with the power of patriarchy for the subjugation and oppression of the women in our society. Tara’s grandfather uses his political and money power to convince the doctor for giving the third leg to Chandan instead of Tara. To look at son and daughter with biased and discriminating eyes has been the traditional and age-old custom in India and it has been tagged with rites and rituals of life.\n\nThe whole drama is circling around one dark secret and its revelation.\n\n______________________________________________________________________\nWant notes, summaries & quizzes for this video? Everything's free at theliteraturetalks.com", "old_tags": ["Tara by Mahesh Dattani", "Summary of Tara by Mahesh Dattani", "Summary of Tara", "Summary of Tara in Hindi", "Tara summary in Hindi", "Tara summary by Mahesh Dattani"], "new_tags": ["Tara by Mahesh Dattani", "Summary of Tara by Mahesh Dattani", "Summary of Tara", "Summary of Tara in Hindi", "Tara summary in Hindi", "Tara summary by Mahesh Dattani", "the literature talks"], "audit": {}, "changes": {"title": false, "tags": true, "description": true}}, {"video_id": "Tm2oxCuUTyE", "old_title": "The character of Nur represents the state of Urdu language and literature in India. | SOL | ABE", "new_title": "The Character Of Nur | Explanation In Hindi | BA English", "old_desc": "Connect with us on telegram -  https://t.me/theliteraturetalks\nGET PDF OF ANSWER \n“In the novel In Custody, the character of Nur represents the state of Urdu language\nand literature in India.” Do you agree?\nAnswer 2, Indian Writing In English - Code - 12031201\nB.A. (Hons.) wo parts in Songs of Innocence in 1789 and Songs of Experience in 1794. The poem \"The Chimney Sweeper\" is set against the dark background of child labour that was prominent in England in the late 18th and 19th centuries. At the age of four and five, boys were sold to clean chimneys, due to their small size. These children were oppressed and had a diminutive existence that was socially accepted at the time. Children in this field of work were often unfed and poorly clothed. In most cases, these children died from either falling through the chimneys or from lung damage and other horrible diseases from breathing in the soot. In the earlier poem, a young chimney sweeper recounts a dream by one of his fellows, in which an angel rescues the boys from coffins and takes them to a sunny meadow; in the latter poem, an apparently adult speaker encounters a child chimney sweeper abandoned in the snow while his parents are at church or possibly even suffered death where the church is referring to being with God.\n\nThe chimney sweeper\nThe chimney sweeper summary\nThe chimney sweeper analysis\nThe chimney sweeper explanation\nThe chimney sweeper line by line \nThe chimney sweeper by William blake\nThe chimney sweeper in Hindi", "new_desc": "Few poems expose the machinery of childhood exploitation as quietly and devastatingly as William Blake's The Chimney Sweeper — a deceptively simple lyric from Songs of Innocence where a child's suffering is dressed in the language of hope, making the reader complicit in the very comfort it offers. Blake wrote this at a time when thousands of boys were sold into chimney sweeping, and the poem's tension between innocence and systemic cruelty makes it essential reading for BA English Honours students at DU, SOL, and IGNOU. If you've ever wondered how a nursery-rhyme tone can carry the weight of social protest, this explanation will change how you read Blake forever.\n\n______________________________________________________________________\nWan rks, the poem is about Christianity. The lamb is a common metaphor for Jesus Christ, who is also called \"The Lamb of God\" in John.\n\nThis poem was written in rhyming couplets, although the rhyme \"lamb\"/\"name\" is only approximate by modern standards. The first and last couplet in each stanza exhibit identical rhyme, as for example the first: \"Little Lamb who made thee / Dost thou know who made thee\". In the first stanza, the speaker asks the lamb who his creator is; the answer lies at the end of the poem. Here we find a physical description of the lamb, seen as a pure and gentle creature. In the second stanza, the lamb is compared with the infant Jesus, as well as between the lamb and the speaker's soul. In the last two lines, the speaker identifies the creator: God.\n\nLike the other Songs of Innocence and Songs of Experience, The Lamb may have been intended to be sung, but no records survive of Blake's own musical settings.[2] It was set to music by Vaughan Williams in his 1958 song cycle Ten Blake Songs, although he described it as \"that horrible little lamb – a poem that I hate\". It was also given a setting by Sir John Tavener, who explained: \"The Lamb came to me fully grown and was written in an afternoon and dedicated to my nephew Simon for his 3rd birthday.\" American poet Allen Ginsberg set the poem to music, along with several other of Blake's poems, in 1969 and was included on his album Songs of Innocence and Experience by William Blake.[4] Ginsberg's songs were re-worked by Steven Taylor for the album Songs of Innocence & of Experience: Shewing The Two Contrary States Of The Human Soul, released in 2019, by Ace Records, to coincide with the Blake exhibition at Tate Britain.\n\n________________________________________________\nthe lamb poem by William blake\nthe lamb poem by William blake summary\nthe lamb poem by William blake explanation\nthe lamb poem by William blake analysis\nthe lamb poem by William Blake in Hindi\nthe lamb poem by William function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function descHtml(text, isNew) {
  if (!text) return '<em style="color:#444">No description</em>';
  if (!isNew) return esc(text);
  const sepIdx = text.indexOf('______');
  if (sepIdx === -1) return esc(text);
  const body = text.slice(0, sepIdx).trimEnd();
  const cta  = text.slice(sepIdx);
  const paras = body.split('\n\n');
  let html = paras.length >= 1
    ? '<span class="desc-opening">' + esc(paras[0]) + '</span>'
      + (paras.length > 1 ? '\n\n' + esc(paras.slice(1).join('\n\n')) : '')
    : '';
  html += '\n\n<span class="desc-cta">' + esc(cta) + '</span>';
  return html;
}

function charInfo(n) {
  if (n > 90) return `<span class="char-warn">${n} chars — over limit</span>`;
  if (n >= 60) return `<span class="char-ok">${n} chars ✓</span>`;
  return `<span class="char-grey">${n} chars</span>`;
}

function scoreClass(s) {
  if (s >= 80) return 'score-p1';
  if (s >= 60) return 'score-p2';
  if (s >= 40) return 'score-p3';
  return 'score-p4';
}

function tagDiff(oldT, newT) {
  const oldSet = new Set(oldT.map(t => t.toLowerCase()));
  const newSet = new Set(newT.map(t => t.toLowerCase()));
  return {
    removed: oldT.filter(t => !newSet.has(t.toLowerCase())),
    added:   newT.filter(t => !oldSet.has(t.toLowerCase())),
    kept:    newT.filter(t =>  oldSet.has(t.toLowerCase())),
  };
}

        <div class="panel-label">After</div>
        <div class="yt-title">${esc(v.new_title)}</div>
        <div class="char-count">${charInfo(v.new_title.length)}</div>
        <div class="yt-meta">TheLiteratureTalks</div>
        <div class="desc-box" onclick="this.classList.toggle('expanded')">
          ${descHtml(v.new_desc, true)}<div class="desc-fade">Show more</div>
        </div>
        <div class="tags-section">
          <div class="tags-label">Tags (${(v.new_tags||[]).length})</div>
          <div class="tags-wrap">
            ${diff.added.map(t=>`<span class="tag added">${esc(t)}</span>`).join('')}
            ${diff.kept.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
  return div;
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const matchSearch = !q || card.dataset.title.includes(q);
    let matchFilter = true;
    const s = parseInt(card.dataset.score);
    if (activeFilter==='title') matchFilter = card.dataset.titleChanged==='1';
    else if (activeFilter==='desc') matchFilter = card.dataset.descChanged==='1';
    else if (activeFilter==='p1') matchFilter = s>=80;
    else if (activeFilter==='p2') matchFilter = s>=60 && s<80;
    card.classList.toggle('hidden', !(matchSearch && matchFilter));
    if (matchSearch && matchFilter) visible++;
  });
  document.getElementById('count-label').textContent = visible + ' videos';
}

function setFilter(btn, f) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = f;
  applyFilters();
}

const root = document.getElementById('cards');
videos.forEach(v => root.appendChild(buildCard(v)));
document.getElementById('count-label').textContent = videos.length + ' videos';
</script>
</body>
</html>
